<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avrasya Bülteni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #232323;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text2: #999;
      --accent: #c8a96e;
      --accent2: #a8884e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }
    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }
    .logo span { color: var(--text); font-weight: 400; }

    nav { display: flex; gap: 8px; flex-wrap: wrap; }
    nav a {
      color: var(--text2);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      transition: 0.2s;
    }
    nav a:hover, nav a.active {
      color: var(--text);
      border-color: var(--accent);
      background: var(--surface2);
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 20px;
      padding: 16px 0;
      font-size: 0.8rem;
      color: var(--text2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stats-bar span { white-space: nowrap; }
    .stats-bar strong { color: var(--accent); }

    /* Content cards */
    .content-grid { padding: 24px 0; display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      transition: 0.2s;
      cursor: pointer;
    }
    .card:hover {
      border-color: var(--accent);
      background: var(--surface2);
    }
    .card-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.75rem;
      color: var(--text2);
      flex-wrap: wrap;
    }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-haber { background: #2d4a3e; color: #6fcf97; }
    .badge-makale { background: #2d3a4a; color: #7eb8da; }
    .badge-bildiri { background: #3a2d4a; color: #bb86fc; }
    .badge-kitap { background: #4a3d2d; color: #f0c27a; }
    .badge-sempozyum { background: #2d3d3a; color: #80cbc4; }
    .badge-panel { background: #3a2d3a; color: #f48fb1; }
    .badge-rapor { background: #3a3a2d; color: #dce775; }

    .card h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .card p {
      font-size: 0.85rem;
      color: var(--text2);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--text2);
    }
    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .card-tags span {
      font-size: 0.7rem;
      padding: 2px 8px;
      background: var(--surface2);
      border-radius: 10px;
      color: var(--text2);
    }
    .source-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.75rem;
    }
    .source-link:hover { text-decoration: underline; }

    /* Loading & Empty states */
    .loading, .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Detay sayfası (modal) */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 720px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
    }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .modal-close:hover { color: var(--text); }
    .modal h2 { font-size: 1.2rem; margin-bottom: 12px; }
    .modal .meta {
      font-size: 0.8rem;
      color: var(--text2);
      margin-bottom: 16px;
    }
    .modal .body {
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .modal .body a { color: var(--accent); }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 0;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text2);
      margin-top: 40px;
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 640px) {
      header .container { flex-direction: column; align-items: flex-start; }
      .stats-bar { gap: 8px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo">🌏 Avrasya <span>Bülteni</span></a>
      <nav>
        <a href="#" data-filter="all" class="active">Tümü</a>
        <a href="#" data-filter="haber">Haber</a>
        <a href="#" data-filter="makale">Makale</a>
        <a href="#" data-filter="kitap">Kitap</a>
        <a href="#" data-filter="bildiri">Bildiri</a>
        <a href="#" data-filter="sempozyum">Sempozyum</a>
        <a href="#" data-filter="panel">Panel</a>
        <a href="#" data-filter="rapor">Rapor</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="stats-bar" id="statsBar"></div>
    <div class="content-grid" id="contentGrid"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <footer>
    <div class="container">
      <p>Avrasya Bülteni · İbn Haldun Üniversitesi Haydar Aliyev Avrasya Çalışmaları Merkezi</p>
      <p>İçerikler otomatik taranmakta ve yapay zeka ile özetlenmektedir.</p>
    </div>
  </footer>

  <script>
    let currentFilter = 'all';

    document.querySelectorAll('nav a').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        document.querySelector('nav a.active')?.classList.remove('active');
        a.classList.add('active');
        currentFilter = a.dataset.filter;
        loadContents();
      });
    });

    async function loadContents() {
      const grid = document.getElementById('contentGrid');
      grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>İçerikler yükleniyor...</p></div>';

      const params = new URLSearchParams({ limit: 50 });
      if (currentFilter !== 'all') params.set('type', currentFilter);

      try {
        const [contentsRes, statsRes] = await Promise.all([
          fetch('/api/contents?' + params.toString()),
          fetch('/api/stats')
        ]);
        const contents = await contentsRes.json();
        const stats = await statsRes.json();

        renderStats(stats);
        renderContents(contents);
      } catch (err) {
        grid.innerHTML = '<div class="empty"><p>İçerikler yüklenirken bir hata oluştu.</p></div>';
      }
    }

    function renderStats(stats) {
      const bar = document.getElementById('statsBar');
      const lastScan = stats.lastScan
        ? new Date(stats.lastScan).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })
        : 'Henüz taranmadı';
      bar.innerHTML = `
        <span>📦 Toplam: <strong>${stats.total}</strong></span>
        <span>📰 Haber: <strong>${stats.haber}</strong></span>
        <span>📄 Makale: <strong>${stats.makale}</strong></span>
        <span>📚 Kitap: <strong>${stats.kitap}</strong></span>
        <span>📋 Bildiri: <strong>${stats.bildiri}</strong></span>
        <span>🎤 Sempozyum: <strong>${stats.sempozyum}</strong></span>
        <span>📊 Panel: <strong>${stats.panel}</strong></span>
        <span>📑 Rapor: <strong>${stats.rapor}</strong></span>
        <span>🔄 Son tarama: ${lastScan}</span>
      `;
    }

    function renderContents(contents) {
      const grid = document.getElementById('contentGrid');
      if (!contents.length) {
        grid.innerHTML = '<div class="empty"><p>Henüz içerik bulunmuyor. İlk tarama yakında yapılacak.</p></div>';
        return;
      }

      grid.innerHTML = contents.map(c => `
        <div class="card" onclick="openDetail('${c.slug}')">
          <div class="card-meta">
            <span class="badge badge-${c.type}">${typeLabel(c.type)}</span>
            <span>${c.category_name || 'Genel'}</span>
            <span>·</span>
            <span>${formatDate(c.published_at)}</span>
          </div>
          <h3>${c.title}</h3>
          <p>${c.summary}</p>
          <div class="card-footer">
            <div class="card-tags">
              ${(c.tags || []).map(t => `<span>${t.name}</span>`).join('')}
            </div>
            ${c.source_name ? `<a href="${c.source_url}" target="_blank" class="source-link" onclick="event.stopPropagation()">${c.source_name} →</a>` : ''}
          </div>
        </div>
      `).join('');
    }

    function typeLabel(type) {
      const labels = {
        haber: 'Haber', makale: 'Makale', bildiri: 'Bildiri',
        kitap: 'Kitap', sempozyum: 'Sempozyum', panel: 'Panel', rapor: 'Rapor'
      };
      return labels[type] || type;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      return new Date(dateStr).toLocaleDateString('tr-TR', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    async function openDetail(slug) {
      const overlay = document.getElementById('modalOverlay');
      const content = document.getElementById('modalContent');
      content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      overlay.classList.add('active');

      try {
        const res = await fetch('/api/contents/' + slug);
        const c = await res.json();
        content.innerHTML = `
          <h2>${c.title}</h2>
          <div class="meta">
            <span class="badge badge-${c.type}">${typeLabel(c.type)}</span>
            <span>${c.category_name || 'Genel'}</span>
            <span>·</span>
            <span>${formatDate(c.published_at)}</span>
            ${c.source_name ? `<span>·</span><a href="${c.source_url}" target="_blank" style="color:var(--accent)">${c.source_name}</a>` : ''}
          </div>
          <div class="body">${c.full_text || c.summary}</div>
        `;
      } catch (err) {
        content.innerHTML = '<div class="empty"><p>İçerik yüklenemedi.</p></div>';
      }
    }

    document.getElementById('modalClose').addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.remove('active');
    });
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) {
        document.getElementById('modalOverlay').classList.remove('active');
      }
    });

    // İlk yükleme
    loadContents();
  </script>
</body>
</html>
